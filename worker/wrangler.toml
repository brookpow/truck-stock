name = "truck-stock-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Receipt-scanner vision model. ONE PLACE to change when a model is retired:
# edit this line, then `npx wrangler deploy`. The worker falls back to the same
# default in code if this is unset. The office Home shows a red banner if scans
# start failing at the API level (e.g. this model 404s), pointing right here.
[vars]
VISION_MODEL = "claude-sonnet-4-6"

# Same shared database as AdTrack, CRM, and GP-tracker.
# This app reads crm_materials (catalog) and writes crm_job_materials (usage).
[[d1_databases]]
binding = "DB"
database_name = "ad-attribution-db"
database_id = "402117f6-2477-4c98-96d7-93640396d07c"

# Receipt photos. PRIVATE bucket (no public access) — served only through the
# worker at GET /api/purchases/:id/photo. Create it once before deploying:
#   npx wrangler r2 bucket create truck-stock-receipts
[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "truck-stock-receipts"
